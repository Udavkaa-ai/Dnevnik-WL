name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Ветка с кодом android-app'
        required: false
        default: 'main'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'main' }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair -v \
            -keystore $HOME/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Install dependencies
        working-directory: android-app
        run: npm install

      - name: Patch expo-modules-core for Gradle 8.8+ compatibility
        working-directory: android-app
        run: |
          # Fix "Could not get unknown property 'release' for SoftwareComponent container"
          # which occurs in Gradle 8.8+ with older expo-modules-core
          sed -i 's/from components\.release/from components.getByName("release")/' \
            node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
          echo "Patched ExpoModulesCorePlugin.gradle"

      - name: Create placeholder assets
        run: |
          mkdir -p android-app/assets
          python3 - <<'EOF'
          import struct, zlib

          def make_png(w, h, r, g, b, path):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              raw = b''.join(b'\x00' + bytes([r, g, b] * w) for _ in range(h))
              idat = zlib.compress(raw)
              png = b'\x89PNG\r\n\x1a\n'
              png += chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              png += chunk(b'IDAT', idat)
              png += chunk(b'IEND', b'')
              open(path, 'wb').write(png)

          make_png(1024, 1024, 26, 26, 46,  'android-app/assets/icon.png')
          make_png(1242, 2688, 26, 26, 46,  'android-app/assets/splash.png')
          make_png(1024, 1024, 26, 26, 46,  'android-app/assets/adaptive-icon.png')
          make_png(96,   96,   108, 99, 255, 'android-app/assets/notification-icon.png')
          EOF

      - name: Generate native Android project
        working-directory: android-app
        run: npx expo prebuild --platform android --no-install

      - name: Bundle JS with expo export:embed
        working-directory: android-app
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false
          echo "Bundle size: $(du -sh android/app/src/main/assets/index.android.bundle)"

      - name: Build release APK (signed with debug keystore)
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dnevnik-${{ github.run_number }}.apk
          path: android-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Summary
        run: |
          SIZE=$(du -sh android-app/android/app/build/outputs/apk/release/app-release.apk | cut -f1)
          echo "## APK готов ($SIZE)" >> $GITHUB_STEP_SUMMARY
          echo "Скачай в разделе **Artifacts** ниже." >> $GITHUB_STEP_SUMMARY
          echo "На телефоне разреши установку из неизвестных источников." >> $GITHUB_STEP_SUMMARY
