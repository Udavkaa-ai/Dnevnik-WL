name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Ветка с android-app (оставь пустым для текущей)'
        required: false
        default: 'claude/android-app-local-storage-5723P'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'claude/android-app-local-storage-5723P' }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: android-app
        run: npm install

      - name: Generate native Android project (expo prebuild)
        working-directory: android-app
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        working-directory: android-app/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dnevnik-debug-${{ github.run_number }}
          path: android-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "## ✅ APK собран!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Скачай APK в разделе **Artifacts** ниже 👇" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "На телефоне: Настройки → Безопасность → Разрешить установку из неизвестных источников" >> $GITHUB_STEP_SUMMARY
